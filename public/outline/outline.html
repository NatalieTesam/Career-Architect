<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Steps - Career Architect</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/outline.css">
    <script src="outline.js" defer type="module"></script>
</head>
<body>
    <header id="main-header"></header> <main>
        <section class="skill-checklist">
            <div class="skill-title">
                <h2 id="skill-name-display">Loading Roadmap...</h2>
                <p id="time-estimate-display" class="time-estimate"></p>
            </div>
            
            <div class="progress-container">
              <progress id="skill-progress" value="0" max="100"></progress>
              <div class="progress-meta">
                <span id="progress-text">0 / 0</span>
                <span id="progress-percent">0%</span>
              </div>
            </div>

            <ul id="checklist-container">
                <li style="list-style:none; text-align:center; padding: 2rem;">
                    Architecting your custom roadmap...
                </li>
            </ul>
        </section>
    </main>

    <footer id="main-footer"></footer> </body>
</html>
