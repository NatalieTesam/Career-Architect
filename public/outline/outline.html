<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Steps</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/outline.css">
    <script src="outline.js" defer type="module"></script>

</head>

<body>
    <header>
    </header>
    <main>
        <section class="skill-checklist">
            <div class="skill-title">
                <h2>Learn Python</h2>
                <p class="time-estimate">Time: 4 weeks</p>
            </div>
            
            <div class="progress-container" aria-hidden="false">
              <progress id="skill-progress" value="0" max="0"></progress>
              <div class="progress-meta">
                <span id="progress-text">0 / 0</span>
                <span id="progress-percent" aria-hidden="true">0%</span>
              </div>
            </div>

            <ul>
                <li>
                <label>
                    <input type="checkbox">
                    Install Python and set up a development environment
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Understand variables and data types (int, float, string, boolean)
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Learn conditionals (if / elif / else)
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Practice loops (for and while)
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Write and use functions
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Work with lists, dictionaries, and tuples
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Handle errors using try / except
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Read from and write to files
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Use external libraries (e.g., install and import packages)
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Build a small command-line project
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Build a larger real-world project (API, web app, or data analysis tool)
                </label>
                </li>

                <li>
                <label>
                    <input type="checkbox">
                    Refactor and document your code properly
                </label>
                </li>

            </ul>
        </section>
    </main>
    <footer>
    </footer>

</body>
</html>
